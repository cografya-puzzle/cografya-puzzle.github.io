// ============ CROSSWORD GENERATOR ============
class CrosswordGenerator {
  constructor(puzzle) {
    this.puzzle = puzzle;
    this.grid = {};
    this.placements = [];
    this.minR = 0; this.maxR = 0;
    this.minC = 0; this.maxC = 0;
    // Sayfa sınırı: ipucu sayısına göre dinamik
    const maxClues = Math.max(puzzle.across.length, puzzle.down.length);
    const gridFrac = maxClues > 15 ? 0.34 : maxClues > 12 ? 0.38 : 0.42;
    const PAGE_H_PX = 1025;
    const MIN_CELL  = 20;
    this.maxRows = Math.floor((PAGE_H_PX * gridFrac) / MIN_CELL);
  }

  generate() {
    const allWords = [];
    this.puzzle.across.forEach(w => allWords.push({ ...w, dir: 'across' }));
    this.puzzle.down.forEach(w => allWords.push({ ...w, dir: 'down' }));
    allWords.sort((a, b) => b.answer.length - a.answer.length);

    let bestResult = null;
    let bestPlaced = 0;

    for (let attempt = 0; attempt < 80; attempt++) {
      this.grid = {};
      this.placements = [];
      this.minR = 0; this.maxR = 0;
      this.minC = 0; this.maxC = 0;

      const shuffled = this._shuffle([...allWords]);

      // Place first word
      const first = shuffled[0];
      if (first.dir === 'across') {
        this._placeWord(first, 0, 0);
      } else {
        this._placeWord(first, 0, 0);
      }

      // Try to place remaining
      let unplaced = shuffled.slice(1);
      let maxPasses = 5;
      while (unplaced.length > 0 && maxPasses > 0) {
        const stillUnplaced = [];
        for (const word of unplaced) {
          if (!this._tryPlace(word)) {
            stillUnplaced.push(word);
          }
        }
        if (stillUnplaced.length === unplaced.length) maxPasses--;
        unplaced = stillUnplaced;
      }

      if (this.placements.length > bestPlaced) {
        bestPlaced = this.placements.length;
        bestResult = {
          grid: { ...this.grid },
          placements: [...this.placements],
          minR: this.minR, maxR: this.maxR,
          minC: this.minC, maxC: this.maxC
        };
      }
      if (bestPlaced === allWords.length) break;
    }

    // Restore best
    this.grid = bestResult.grid;
    this.placements = bestResult.placements;
    this.minR = bestResult.minR;
    this.maxR = bestResult.maxR;
    this.minC = bestResult.minC;
    this.maxC = bestResult.maxC;

    this._assignNumbers();
    return this;
  }

  _shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  _key(r, c) { return `${r},${c}`; }

  _placeWord(word, r, c) {
    const letters = word.answer.split('');
    const placement = { word, r, c, len: letters.length };
    for (let i = 0; i < letters.length; i++) {
      const cr = word.dir === 'across' ? r : r + i;
      const cc = word.dir === 'across' ? c + i : c;
      this.grid[this._key(cr, cc)] = letters[i];
      this.minR = Math.min(this.minR, cr);
      this.maxR = Math.max(this.maxR, cr);
      this.minC = Math.min(this.minC, cc);
      this.maxC = Math.max(this.maxC, cc);
    }
    this.placements.push(placement);
  }

  _tryPlace(word) {
    const letters = word.answer.split('');
    let bestPos = null;
    let bestScore = -1;

    for (let i = 0; i < letters.length; i++) {
      for (const p of this.placements) {
        if (p.word.dir === word.dir) continue;
        const pLetters = p.word.answer.split('');
        for (let j = 0; j < pLetters.length; j++) {
          if (pLetters[j] !== letters[i]) continue;
          let r, c;
          if (word.dir === 'across') {
            r = p.word.dir === 'down' ? p.r + j : p.r;
            c = (p.word.dir === 'down' ? p.c : p.c + j) - i;
          } else {
            r = (p.word.dir === 'across' ? p.r : p.r + j) - i;
            c = p.word.dir === 'across' ? p.c + j : p.c;
          }
          if (this._canPlace(word, r, c)) {
            const score = this._scorePlace(word, r, c);
            if (score > bestScore) {
              bestScore = score;
              bestPos = { r, c };
            }
          }
        }
      }
    }

    if (bestPos) {
      this._placeWord(word, bestPos.r, bestPos.c);
      return true;
    }
    return false;
  }

  _canPlace(word, r, c) {
    const letters = word.answer.split('');
    for (let i = 0; i < letters.length; i++) {
      const cr = word.dir === 'across' ? r : r + i;
      const cc = word.dir === 'across' ? c + i : c;
      const k = this._key(cr, cc);
      if (this.grid[k] !== undefined) {
        if (this.grid[k] !== letters[i]) return false;
      } else {
        // Check adjacency
        if (word.dir === 'across') {
          const above = this.grid[this._key(cr - 1, cc)];
          const below = this.grid[this._key(cr + 1, cc)];
          if (above !== undefined || below !== undefined) return false;
        } else {
          const left = this.grid[this._key(cr, cc - 1)];
          const right = this.grid[this._key(cr, cc + 1)];
          if (left !== undefined || right !== undefined) return false;
        }
      }
    }

    // Check before and after word
    const beforeR = word.dir === 'across' ? r : r - 1;
    const beforeC = word.dir === 'across' ? c - 1 : c;
    const afterR = word.dir === 'across' ? r : r + letters.length;
    const afterC = word.dir === 'across' ? c + letters.length : c;
    if (this.grid[this._key(beforeR, beforeC)] !== undefined) return false;
    if (this.grid[this._key(afterR, afterC)] !== undefined) return false;

    // Sayfa yüksekliği kısıtı: bu kelimeyi yerleştirirsek kaç satır olur?
    const newMinR = Math.min(this.minR, r);
    const newMaxR = Math.max(this.maxR, word.dir === 'across' ? r : r + letters.length - 1);
    if (newMaxR - newMinR + 1 > this.maxRows) return false;

    return true;
  }

  _scorePlace(word, r, c) {
    let score = 0;
    const letters = word.answer.split('');
    for (let i = 0; i < letters.length; i++) {
      const cr = word.dir === 'across' ? r : r + i;
      const cc = word.dir === 'across' ? c + i : c;
      if (this.grid[this._key(cr, cc)] === letters[i]) score += 2;
    }
    return score;
  }

  _assignNumbers() {
    // Collect start positions
    const starts = new Map();
    for (const p of this.placements) {
      const k = this._key(p.r, p.c);
      if (!starts.has(k)) starts.set(k, { r: p.r, c: p.c, across: null, down: null });
      const entry = starts.get(k);
      if (p.word.dir === 'across') entry.across = p;
      else entry.down = p;
    }

    // Sort by position (top-to-bottom, left-to-right)
    const sorted = [...starts.values()].sort((a, b) => {
      if (a.r !== b.r) return a.r - b.r;
      return a.c - b.c;
    });

    this.numberedCells = {};
    this.acrossClues = [];
    this.downClues = [];
    let num = 1;
    for (const s of sorted) {
      const k = this._key(s.r, s.c);
      this.numberedCells[k] = num;
      if (s.across) this.acrossClues.push({ num, clue: s.across.word.clue, answer: s.across.word.answer });
      if (s.down) this.downClues.push({ num, clue: s.down.word.clue, answer: s.down.word.answer });
      num++;
    }
  }
}

// ============ RENDERER ============
const CELL_SIZE = 32;
const PADDING = 10;

function renderPuzzle(cw, showAnswers, targetCanvas, scale) {
  scale = scale || 1;
  const cs = CELL_SIZE * scale;
  const pd = PADDING * scale;
  const canvas = targetCanvas || document.getElementById('puzzleCanvas');
  const cols = cw.maxC - cw.minC + 1;
  const rows = cw.maxR - cw.minR + 1;

  canvas.width = cols * cs + pd * 2;
  canvas.height = rows * cs + pd * 2;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = cw.minR; r <= cw.maxR; r++) {
    for (let c = cw.minC; c <= cw.maxC; c++) {
      const k = `${r},${c}`;
      const x = (c - cw.minC) * cs + pd;
      const y = (r - cw.minR) * cs + pd;

      if (cw.grid[k] !== undefined) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x, y, cs, cs);
        ctx.strokeStyle = '#4a5568';
        ctx.lineWidth = 1.2 * scale;
        ctx.strokeRect(x, y, cs, cs);

        if (cw.numberedCells[k]) {
          ctx.fillStyle = '#e53e3e';
          ctx.font = `bold ${Math.round(9 * scale)}px Arial`;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.fillText(cw.numberedCells[k], x + 2 * scale, y + 1.5 * scale);
        }

        if (showAnswers) {
          ctx.fillStyle = '#2d3748';
          ctx.font = `bold ${Math.round(14 * scale)}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(cw.grid[k], x + cs / 2, y + cs / 2 + 1.5 * scale);
        }
      }
    }
  }
}

function renderClues(cw) {
  const acrossDiv = document.getElementById('acrossClues');
  const downDiv = document.getElementById('downClues');

  acrossDiv.innerHTML = cw.acrossClues.map(c =>
    `<div class="clue-item"><span class="clue-num">${c.num}.</span>${c.clue}</div>`
  ).join('');

  downDiv.innerHTML = cw.downClues.map(c =>
    `<div class="clue-item"><span class="clue-num">${c.num}.</span>${c.clue}</div>`
  ).join('');
}

// ============ STATE ============
let currentIndex = 0;
let currentCW = null;
const generatedPuzzles = [];

function generateAll() {
  for (let i = 0; i < PUZZLES.length; i++) {
    const gen = new CrosswordGenerator(PUZZLES[i]);
    gen.generate();
    generatedPuzzles.push(gen);
  }
}

function showPuzzle(idx) {
  currentIndex = idx;
  currentCW = generatedPuzzles[idx];
  document.getElementById('puzzleLabel').textContent = `Bulmaca ${idx + 1} / ${PUZZLES.length}`;
  document.getElementById('puzzleTitle').textContent = PUZZLES[idx].title;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === PUZZLES.length - 1;
  renderPuzzle(currentCW, false);
  renderClues(currentCW);
}

function navigate(dir) {
  const newIdx = currentIndex + dir;
  if (newIdx >= 0 && newIdx < PUZZLES.length) showPuzzle(newIdx);
}

// ============ PNG DOWNLOAD ============
function downloadPNG(withAnswers) {
  const offscreen = document.createElement('canvas');
  renderPuzzle(currentCW, withAnswers, offscreen, 2);
  const link = document.createElement('a');
  const suffix = withAnswers ? '_cevap' : '_bos';
  link.download = `bulmaca_${currentIndex + 1}${suffix}.png`;
  link.href = offscreen.toDataURL('image/png');
  link.click();
}

// ============ DOCX GENERATION ============
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'DOCX hazırlanıyor...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function canvasToUint8(canvas) {
  const b64 = canvas.toDataURL('image/png').split(',')[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// ── Kitapçık renk paleti ──────────────────────────────
const C = {
  primary:  '5B2C8B',  // derin mor - başlık, ana aksanlar
  medium:   '7B4FAF',  // orta mor - ikincil öğeler
  light:    'EDE8F8',  // açık mor - tablo arka planı
  ink:      '2C2C2C',  // ana metin
  muted:    '6B6B8B',  // soluk metin, bulmaca numarası
  gridLine: '9B7BC8',  // ızgara çizgileri (açık mor)
  gridBg:   'F4F0FA',  // ızgara hücre arka planı (çok açık mor)
  numBadge: '5B2C8B',  // hücre numara rozeti arka planı
  answer:   '2C1A5C',  // cevap harfleri (koyu mor)
  white:    'FFFFFF',  // beyaz
};
const FONT_SERIF = 'Georgia';
const FONT_SANS  = 'Calibri';

function renderBookletGrid(cw, showAnswers, cellPx) {
  const cols = cw.maxC - cw.minC + 1;
  const rows = cw.maxR - cw.minR + 1;
  const sc  = 3;
  const rcs = cellPx * sc;
  const pad = 4 * sc;
  const lw  = Math.round(1.6 * sc); // tek çizgi kalınlığı — hiç çift çizilmeyecek

  const canvas = document.createElement('canvas');
  canvas.width  = cols * rcs + pad * 2;
  canvas.height = rows * rcs + pad * 2;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 1) Tüm aktif hücrelerin arka planını doldur
  const cellFill = showAnswers ? '#EDE8F8' : '#' + C.gridBg;
  for (let r = cw.minR; r <= cw.maxR; r++) {
    for (let c = cw.minC; c <= cw.maxC; c++) {
      if (cw.grid[`${r},${c}`] !== undefined) {
        ctx.fillStyle = cellFill;
        ctx.fillRect((c - cw.minC) * rcs + pad, (r - cw.minR) * rcs + pad, rcs, rcs);
      }
    }
  }

  // 2) Çizgileri path ile tek seferde çiz — her kenar yalnızca bir kez
  ctx.strokeStyle = '#' + C.gridLine;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'square';
  ctx.beginPath();

  for (let r = cw.minR; r <= cw.maxR; r++) {
    for (let c = cw.minC; c <= cw.maxC; c++) {
      if (cw.grid[`${r},${c}`] === undefined) continue;
      const x = (c - cw.minC) * rcs + pad;
      const y = (r - cw.minR) * rcs + pad;

      // Üst kenar: üst komşu yoksa çiz
      if (cw.grid[`${r-1},${c}`] === undefined) {
        ctx.moveTo(x, y); ctx.lineTo(x + rcs, y);
      }
      // Sol kenar: sol komşu yoksa çiz
      if (cw.grid[`${r},${c-1}`] === undefined) {
        ctx.moveTo(x, y); ctx.lineTo(x, y + rcs);
      }
      // Sağ kenar: sağ komşu yoksa çiz
      if (cw.grid[`${r},${c+1}`] === undefined) {
        ctx.moveTo(x + rcs, y); ctx.lineTo(x + rcs, y + rcs);
      }
      // Alt kenar: alt komşu yoksa çiz
      if (cw.grid[`${r+1},${c}`] === undefined) {
        ctx.moveTo(x, y + rcs); ctx.lineTo(x + rcs, y + rcs);
      }
      // İç yatay bölücü: üst komşu varsa (paylaşılan üst kenar)
      if (cw.grid[`${r-1},${c}`] !== undefined) {
        ctx.moveTo(x, y); ctx.lineTo(x + rcs, y);
      }
      // İç dikey bölücü: sol komşu varsa
      if (cw.grid[`${r},${c-1}`] !== undefined) {
        ctx.moveTo(x, y); ctx.lineTo(x, y + rcs);
      }
    }
  }
  ctx.stroke();

  // 3) Numaralar ve harfler
  for (let r = cw.minR; r <= cw.maxR; r++) {
    for (let c = cw.minC; c <= cw.maxC; c++) {
      const k = `${r},${c}`;
      if (cw.grid[k] === undefined) continue;
      const x = (c - cw.minC) * rcs + pad;
      const y = (r - cw.minR) * rcs + pad;

      if (cw.numberedCells[k]) {
        const num = String(cw.numberedCells[k]);
        if (!showAnswers) {
          // Boş ızgara: mor badge
          const badgeSz = 9 * sc;
          const bx = x + 1.5 * sc;
          const by = y + 1.5 * sc;
          ctx.fillStyle = '#' + C.numBadge;
          ctx.beginPath();
          ctx.roundRect(bx, by, badgeSz, badgeSz, 1.5 * sc);
          ctx.fill();
          ctx.fillStyle = '#' + C.white;
          ctx.font = `bold ${Math.round(6.5 * sc)}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(num, bx + badgeSz / 2, by + badgeSz / 2);
        } else {
          // Cevap anahtarı: sol üst köşede küçük numara
          ctx.fillStyle = '#' + C.muted;
          ctx.font = `${Math.round(5.5 * sc)}px Arial`;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.fillText(num, x + 2 * sc, y + 1.5 * sc);
        }
      }
      if (showAnswers && cw.grid[k]) {
        ctx.fillStyle = '#' + C.answer;
        ctx.font = `bold ${Math.round(12 * sc)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cw.grid[k], x + rcs / 2, y + rcs / 2 + 2 * sc);
      }
    }
  }

  return canvas;
}

function buildPuzzlePage(cw, idx, showAnswers) {
  const { Paragraph, TextRun, ImageRun, AlignmentType, BorderStyle,
          TableRow, TableCell, Table, WidthType, ShadingType } = docx;

  // A4 kullanılabilir alan (96dpi piksel)
  const PAGE_W_PX = 697;
  const PAGE_H_PX = 1025;
  const maxClues = Math.max(cw.acrossClues.length, cw.downClues.length);
  const MAX_GRID_H = PAGE_H_PX * (maxClues > 15 ? 0.34 : maxClues > 12 ? 0.38 : 0.42);
  const MAX_CELL_PX = 36;
  const MIN_CELL_PX = 20;

  const cols = cw.maxC - cw.minC + 1;
  const rows = cw.maxR - cw.minR + 1;

  let cellPx = Math.min(MAX_CELL_PX, Math.floor((PAGE_W_PX - 8) / cols), Math.floor((MAX_GRID_H - 8) / rows));
  cellPx = Math.max(cellPx, MIN_CELL_PX);

  let imgW = cols * cellPx + 8;
  let imgH = rows * cellPx + 8;
  if (imgW > PAGE_W_PX) {
    cellPx = Math.floor((PAGE_W_PX - 8) / cols);
    imgW = cols * cellPx + 8;
    imgH = rows * cellPx + 8;
  }

  const gridCanvas = renderBookletGrid(cw, showAnswers, cellPx);
  const imgData = canvasToUint8(gridCanvas);

  const children = [];

  // ── Bulmaca numarası ──
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: { before: 0, after: 30 },
    children: [
      new TextRun({
        text: `BULMACA ${idx + 1}`,
        size: 16, font: FONT_SANS, color: C.muted, characterSpacing: 120
      })
    ]
  }));

  // ── Başlık ──
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: { after: 60 },
    border: { bottom: { style: BorderStyle.THICK, size: 8, color: C.primary } },
    children: [
      new TextRun({
        text: PUZZLES[idx].title,
        bold: true, size: 34, font: FONT_SANS, color: C.primary
      })
    ]
  }));

  // ── Izgara ──
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: { before: 60, after: 80 },
    children: [
      new ImageRun({
        data: imgData,
        transformation: { width: imgW, height: imgH },
        type: 'png'
      })
    ]
  }));

  // ── İpuçları: 4 sütunlu tablo ──
  const CLUE_SZ  = maxClues > 15 ? 13 : maxClues > 12 ? 14 : 15;
  const NUM_SZ   = CLUE_SZ;
  const HEAD_SZ  = maxClues > 15 ? 14 : 15;
  const rowMgn   = maxClues > 15 ? 20 : maxClues > 12 ? 28 : 40;

  // Header satırı
  const headerRow = new TableRow({
    tableHeader: true,
    children: [
      new TableCell({
        width: { size: 6, type: WidthType.PERCENTAGE },
        shading: { type: ShadingType.SOLID, color: C.primary },
        margins: { top: 60, bottom: 60, left: 80, right: 60 },
        borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } },
        children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'Nu.', bold: true, size: HEAD_SZ, font: FONT_SANS, color: C.white })] })]
      }),
      new TableCell({
        width: { size: 44, type: WidthType.PERCENTAGE },
        shading: { type: ShadingType.SOLID, color: C.primary },
        margins: { top: 60, bottom: 60, left: 80, right: 80 },
        borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } },
        children: [new Paragraph({ children: [new TextRun({ text: 'SOLDAN SAĞA  →', bold: true, size: HEAD_SZ, font: FONT_SANS, color: C.white })] })]
      }),
      new TableCell({
        width: { size: 6, type: WidthType.PERCENTAGE },
        shading: { type: ShadingType.SOLID, color: C.primary },
        margins: { top: 60, bottom: 60, left: 80, right: 60 },
        borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } },
        children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'Nu.', bold: true, size: HEAD_SZ, font: FONT_SANS, color: C.white })] })]
      }),
      new TableCell({
        width: { size: 44, type: WidthType.PERCENTAGE },
        shading: { type: ShadingType.SOLID, color: C.primary },
        margins: { top: 60, bottom: 60, left: 80, right: 80 },
        borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } },
        children: [new Paragraph({ children: [new TextRun({ text: 'YUKARIDAN AŞAĞIYA  ↓', bold: true, size: HEAD_SZ, font: FONT_SANS, color: C.white })] })]
      })
    ]
  });

  // Veri satırları
  const maxLen = Math.max(cw.acrossClues.length, cw.downClues.length);
  const dataRows = [];
  for (let i = 0; i < maxLen; i++) {
    const ac = cw.acrossClues[i];
    const dn = cw.downClues[i];
    const rowBg = i % 2 === 0 ? C.white : 'F8F5FD';
    const makeCluePair = (clueObj) => [
      new TableCell({
        width: { size: 6, type: WidthType.PERCENTAGE },
        shading: { type: ShadingType.SOLID, color: rowBg },
        margins: { top: rowMgn, bottom: rowMgn, left: 80, right: 40 },
        borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } },
        children: [new Paragraph({ alignment: AlignmentType.CENTER, children: clueObj ? [new TextRun({ text: String(clueObj.num), bold: true, size: NUM_SZ, font: FONT_SANS, color: C.primary })] : [] })]
      }),
      new TableCell({
        width: { size: 44, type: WidthType.PERCENTAGE },
        shading: { type: ShadingType.SOLID, color: rowBg },
        margins: { top: rowMgn, bottom: rowMgn, left: 80, right: 80 },
        borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } },
        children: [new Paragraph({ children: clueObj ? [new TextRun({ text: clueObj.clue, size: CLUE_SZ, font: FONT_SANS, color: C.ink })] : [] })]
      })
    ];
    dataRows.push(new TableRow({
      children: [...makeCluePair(ac), ...makeCluePair(dn)]
    }));
  }

  const clueTable = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    borders: {
      top:           { style: BorderStyle.SINGLE, size: 4, color: C.primary },
      bottom:        { style: BorderStyle.SINGLE, size: 4, color: C.primary },
      left:          { style: BorderStyle.NONE },
      right:         { style: BorderStyle.NONE },
      insideH:       { style: BorderStyle.NONE },
      insideV:       { style: BorderStyle.NONE }
    },
    rows: [headerRow, ...dataRows]
  });

  children.push(clueTable);
  return children;
}

async function downloadSingleDocx(showAnswers) {
  showLoading(`Bulmaca ${currentIndex + 1} DOCX hazırlanıyor...`);
  await new Promise(r => setTimeout(r, 50));

  try {
    const { Document, Packer } = docx;
    const doc = new Document({
      sections: [{
        properties: {
          page: {
            size: { width: 11906, height: 16838 },
            margin: { top: 720, bottom: 720, left: 720, right: 720 }
          }
        },
        children: buildPuzzlePage(currentCW, currentIndex, showAnswers)
      }]
    });

    const blob = await Packer.toBlob(doc);
    const suffix = showAnswers ? '_cevap' : '_bos';
    saveAs(blob, `bulmaca_${currentIndex + 1}${suffix}.docx`);
  } catch (e) {
    console.error(e);
    alert('DOCX olusturulurken hata: ' + e.message);
  }
  hideLoading();
}

function buildAnswerKeyPages() {
  const { Paragraph, TextRun, ImageRun, AlignmentType, BorderStyle } = docx;
  const ANSWERS_PER_PAGE = 2;
  const pages = [];

  for (let i = 0; i < generatedPuzzles.length; i += ANSWERS_PER_PAGE) {
    const children = [];

    // ── Sayfa başlığı (sadece ilk cevap anahtarı sayfasında) ──
    if (i === 0) {
      children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { after: 50 },
        children: [
          new TextRun({
            text: 'CEVAP ANAHTARLARI',
            bold: true, size: 28, font: FONT_SERIF,
            color: C.primary, characterSpacing: 100
          })
        ]
      }));
      children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { after: 120 },
        border: { bottom: { style: BorderStyle.DOUBLE, size: 6, color: C.primary } },
        children: [new TextRun({ text: ' ', size: 2 })]
      }));
    }

    const end = Math.min(i + ANSWERS_PER_PAGE, generatedPuzzles.length);
    for (let j = i; j < end; j++) {
      const cw = generatedPuzzles[j];
      const cols = cw.maxC - cw.minC + 1;
      const rows = cw.maxR - cw.minR + 1;

      // Cevap anahtarı için hücre boyutu (2/sayfa, daha büyük)
      const maxW = 510;
      const maxH = 340;
      let cellPx = Math.min(24, Math.floor((maxW - 8) / cols), Math.floor((maxH - 8) / rows));
      cellPx = Math.max(cellPx, 12);

      const gridCanvas = renderBookletGrid(cw, true, cellPx);
      const imgW = cols * cellPx + 8;
      const imgH = rows * cellPx + 8;
      const imgData = canvasToUint8(gridCanvas);

      // Bulmaca etiketi
      children.push(new Paragraph({
        spacing: { before: j > i ? 140 : 0, after: 30 },
        border: { bottom: { style: BorderStyle.SINGLE, size: 3, color: C.primary } },
        children: [
          new TextRun({
            text: `Bulmaca ${j + 1}`,
            bold: true, size: 20, font: FONT_SERIF, color: C.primary
          }),
          new TextRun({
            text: `  \u2014  ${PUZZLES[j].title}`,
            size: 18, font: FONT_SERIF, color: C.muted
          })
        ]
      }));

      // Cevap ızgarası
      children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { after: 30 },
        children: [
          new ImageRun({
            data: imgData,
            transformation: { width: imgW, height: imgH },
            type: 'png'
          })
        ]
      }));
    }

    pages.push({
      properties: {
        page: {
          size: { width: 11906, height: 16838 },
          margin: { top: 720, bottom: 720, left: 720, right: 720 }
        }
      },
      children
    });
  }

  return pages;
}

async function downloadAllDocx(showAnswers) {
  showLoading('Tüm bulmacalar DOCX hazırlanıyor...');
  await new Promise(r => setTimeout(r, 50));

  try {
    const { Document, Packer } = docx;
    const sections = [];

    // Puzzle pages (always empty/blank)
    for (let i = 0; i < generatedPuzzles.length; i++) {
      document.getElementById('loadingText').textContent =
        `DOCX: Bulmaca ${i + 1} / ${generatedPuzzles.length}`;
      await new Promise(r => setTimeout(r, 10));

      sections.push({
        properties: {
          page: {
            size: { width: 11906, height: 16838 },
            margin: { top: 720, bottom: 720, left: 720, right: 720 }
          }
        },
        children: buildPuzzlePage(generatedPuzzles[i], i, false)
      });
    }

    // Answer key pages at the end
    document.getElementById('loadingText').textContent = 'Cevap anahtarları ekleniyor...';
    await new Promise(r => setTimeout(r, 10));
    const answerPages = buildAnswerKeyPages();
    sections.push(...answerPages);

    const doc = new Document({ sections });
    const blob = await Packer.toBlob(doc);
    saveAs(blob, 'bulmacalar.docx');
  } catch (e) {
    console.error(e);
    alert('DOCX olusturulurken hata: ' + e.message);
  }
  hideLoading();
}

showPuzzle(0);
